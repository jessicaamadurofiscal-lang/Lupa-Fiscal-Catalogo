services:
  - type: web
    name: catalogo-comercial-lupa-fiscal
    runtime: static
    buildCommand: ""
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=300
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
